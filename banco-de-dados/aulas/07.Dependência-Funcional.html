<h1 id="depend%C3%AAncia-funcional">Dependência Funcional</h1>
<p>Banco de Dados</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="default" lang="pt-BR" data-marpit-pagination="2" style="--paginate:true;--theme:default;" data-marpit-pagination-total="28" data-size="16:9">
<h2 id="objetivos-da-aula">Objetivos da aula</h2>
<p>Ao final desta aula, você será capaz de:</p>
<ul>
<li>Compreender o conceito de dependência funcional</li>
<li>Identificar dependências em tabelas</li>
<li>Analisar problemas de redundância</li>
<li>Detectar dependências em estruturas mal projetadas</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="default" lang="pt-BR" data-marpit-pagination="3" style="--paginate:true;--theme:default;" data-marpit-pagination-total="28" data-size="16:9">
<h2 id="revis%C3%A3o-r%C3%A1pida">Revisão rápida</h2>
<p>Em um banco relacional, os dados são organizados em tabelas.</p>
<p>Cada linha representa um registro.</p>
<p>Cada coluna representa um atributo.</p>
<p><strong>Pergunta-chave:</strong> quais atributos determinam outros atributos?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="default" lang="pt-BR" data-marpit-pagination="4" style="--paginate:true;--theme:default;" data-marpit-pagination-total="28" data-size="16:9">
<h2 id="conceito-de-depend%C3%AAncia-funcional">Conceito de dependência funcional</h2>
<p>Uma dependência funcional ocorre quando o valor de um atributo (ou conjunto de atributos)<br />
<strong>determina</strong> o valor de outro atributo.</p>

elas devem possuir o mesmo valor em <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.726ex" height="1.545ex" role="img" focusable="false" viewBox="0 -683 763 683"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D44C" d="M66 637Q54 637 49 637T39 638T32 641T30 647T33 664T42 682Q44 683 56 683Q104 680 165 680Q288 680 306 683H316Q322 677 322 674T320 656Q316 643 310 637H298Q242 637 242 624Q242 619 292 477T343 333L346 336Q350 340 358 349T379 373T411 410T454 461Q546 568 561 587T577 618Q577 634 545 637Q528 637 528 647Q528 649 530 661Q533 676 535 679T549 683Q551 683 578 682T657 680Q684 680 713 681T746 682Q763 682 763 673Q763 669 760 657T755 643Q753 637 734 637Q662 632 617 587Q608 578 477 424L348 273L322 169Q295 62 295 57Q295 46 363 46Q379 46 384 45T390 35Q390 33 388 23Q384 6 382 4T366 1Q361 1 324 1T232 2Q170 2 138 2T102 1Q84 1 84 9Q84 14 87 24Q88 27 89 30T90 35T91 39T93 42T96 44T101 45T107 45T116 46T129 46Q168 47 180 50T198 63Q201 68 227 171L252 274L129 623Q128 624 127 625T125 627T122 629T118 631T113 633T105 634T96 635T83 636T66 637Z"></path></g></g></g></svg></mjx-container>.</p>

<h2 id="analogia-cpf-e-pessoa">Analogia: CPF e pessoa</h2>
<p>Pense no <strong>CPF</strong> como o atributo determinante.</p>

<h2 id="anomalias-causadas-pela-redund%C3%A2ncia">Anomalias causadas pela redundância</h2>
<ol>
<li><strong>Anomalia de atualização</strong>
<ul>

<li><strong>Anomalia de inserção</strong>
<ul>

</ul>
</li>
<li><strong>Anomalia de exclusão</strong>

</ul>
</li>
</ol>
</section>

<h2 id="como-detectar-estruturas-mal-projetadas">Como detectar estruturas mal projetadas</h2>
<p>Checklist prático:</p>
<ol>
<li>Identifique a chave primária.</li>
<li>Liste dependências funcionais observadas.</li>
<li>Verifique dependências parciais.</li>
<li>Verifique dependências transitivas.</li>
<li>Procure atributos repetidos em muitas linhas.</li>
</ol>
<p>Se houver parciais/transitivas, a modelagem pode estar fraca.</p>
</section>
